material_model: HSS
units: {stress: kPa, length: m, weight: kN/m3}
bounds_mode: tight               # 'tight' | 'wide'

# DRY templates via YAML anchors
_anchors:
  hss_sand_free: &hss_sand_free
    E50_ref:
      bounds_tight: [30.0e3, 80.0e3]
      bounds_wide:  [10.0e3, 200.0e3]
      scale: log
      unit: kPa
    Eoed_ref:
      bounds_tight: [30.0e3, 80.0e3]
      bounds_wide:  [10.0e3, 200.0e3]
      scale: log
      unit: kPa
    Eur_ref:
      bounds_tight: [90.0e3, 240.0e3]
      bounds_wide:  [30.0e3, 600.0e3]
      scale: log
      unit: kPa
    G0_ref:
      bounds_tight: [150.0e3, 400.0e3]
      bounds_wide:  [50.0e3, 800.0e3]
      scale: log
      unit: kPa
    m:
      bounds_tight: [0.5, 0.7]
      bounds_wide:  [0.4, 1.0]
      scale: linear
      unit: '-'
    phi:
      bounds_tight: [32.0, 40.0]
      bounds_wide:  [28.0, 42.0]
      scale: linear
      unit: deg
    c_ref:
      bounds_tight: [0.0, 5.0]
      bounds_wide:  [0.0, 20.0]
      scale: linear
      unit: kPa
    gamma_07:
      bounds_tight: [1.5e-4, 3.0e-4]
      bounds_wide:  [1.0e-4, 5.0e-4]
      scale: log
      unit: '-'

layers:
  - name: Sandstone
    plaxis_material_id: "Sandstone"
    free: *hss_sand_free
    fixed:
      psi:    {value: 0.0, unit: deg}
      nu_ur:  {value: 0.2, unit: '-'}
      Rf:     {value: 0.9, unit: '-'}
      pref:   {value: 100.0, unit: kPa}

  - name: Calcisiltite
    plaxis_material_id: "Calcisiltite"
    free:
      Eur_ref:
        bounds_tight: [400.0e3, 1.2e6]
        bounds_wide:  [200.0e3, 2.0e6]
        scale: log
        unit: kPa
      G0_ref:
        bounds_tight: [800.0e3, 2.0e6]
        bounds_wide:  [400.0e3, 3.0e6]
        scale: log
        unit: kPa
      phi:
        bounds_tight: [38.0, 45.0]
        bounds_wide:  [35.0, 50.0]
        scale: linear
        unit: deg
      c_ref:
        bounds_tight: [100.0, 300.0]
        bounds_wide:  [50.0, 500.0]
        scale: linear
        unit: kPa
    fixed:
      psi:      {value: 0.0,   unit: deg}
      nu_ur:    {value: 0.2,   unit: '-'}
      Rf:       {value: 0.9,   unit: '-'}
      pref:     {value: 100.0, unit: kPa}
      m:        {value: 0.5,   unit: '-'}
      gamma_07: {value: 2.0e-4, unit: '-'}
      E50_ref:  {value: 400.0e3, unit: kPa}
      Eoed_ref: {value: 400.0e3, unit: kPa}

# Constraints parsed at runtime. Strings reference param names directly
# for intra_layer; use 'Layer.param' for inter_layer.
constraints:
  intra_layer:
    - "Eur_ref >= 3.0 * E50_ref"
    - "Eur_ref >= Eoed_ref"
    - "G0_ref  >= Eur_ref / (2.0 * (1.0 + nu_ur))"
  inter_layer:
    - "Calcisiltite.phi     >= Sandstone.phi"
    - "Calcisiltite.Eur_ref >= Sandstone.Eur_ref"

ties: []   # e.g. [{param: gamma_07, layers: [Sandstone, Calcisiltite]}]