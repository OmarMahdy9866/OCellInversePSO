name: ocell-inverse-pso
channels:
  - conda-forge
  - defaults
dependencies:
  # ---- Python ----
  - python=3.11

  # ---- Scientific stack ----
  - numpy>=1.24,<2.2
  - scipy>=1.11,<1.15
  - pandas>=2.0,<2.3
  - scikit-learn>=1.3

  # ---- Plotting ----
  - matplotlib>=3.7,<3.10
  - seaborn>=0.13
  - plotly>=5.18

  # ---- I/O ----
  - openpyxl>=3.1
  - pyyaml>=6.0
  - tqdm>=4.66

  # ---- Notebook ----
  - jupyterlab>=4.0
  - ipykernel>=6.25
  - ipywidgets>=8.1

  # ---- Logging / QoL ----
  - rich>=13.7
  - joblib>=1.3

  # ---- Dashboard ----
  - streamlit>=1.32
  - watchdog>=3.0

  # ---- UQ ----
  - emcee>=3.1
  - arviz>=0.17
  - corner>=2.2

  # ---- pip-only packages ----
  - pip
  - pip:
      - plxscripting               # PLAXIS Remote Scripting
      - SALib>=1.4
      - loguru>=0.7